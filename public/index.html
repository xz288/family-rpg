<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family RPG – Enter the Realm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0d0a06;
    --parchment: #1a140a;
    --panel: #12100d;
    --border: #3a2e1e;
    --text: #d4c9a8;
    --muted: #7a6e55;
    --red: #8b2020;
    --green: #2a6b3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated starfield background */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, #1a0e00 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 30% 20%, #0a0500 0%, transparent 60%),
      #080500;
  }

  .stars {
    position: fixed; inset: 0; z-index: 1;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(201,168,76,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 15%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 80%, rgba(201,168,76,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 75%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 90% 40%, rgba(201,168,76,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 30%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 5% 45%, rgba(201,168,76,0.5) 0%, transparent 100%);
    animation: twinkle 4s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.6; }
    to { opacity: 1; }
  }

  .panel {
    position: relative; z-index: 10;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 2px;
    width: 420px;
    padding: 48px 40px;
    box-shadow:
      0 0 0 1px rgba(201,168,76,0.08),
      0 0 40px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(201,168,76,0.1);
  }

  .panel::before {
    content: '';
    position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
    border: 1px solid rgba(201,168,76,0.06);
    border-radius: 2px;
    pointer-events: none;
  }

  /* Corner ornaments */
  .panel::after {
    content: '✦';
    position: absolute; top: 16px; right: 20px;
    color: rgba(201,168,76,0.3); font-size: 12px;
  }

  .ornament-tl {
    position: absolute; top: 16px; left: 20px;
    color: rgba(201,168,76,0.3); font-size: 12px;
  }

  .crest {
    text-align: center;
    margin-bottom: 32px;
  }

  .crest-icon {
    font-size: 48px;
    line-height: 1;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
  }

  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.3;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-style: italic;
    letter-spacing: 0.08em;
  }

  /* Tabs */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Cinzel Decorative', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 10px;
    cursor: pointer;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }

  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  /* Form */
  .form-group { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'Crimson Pro', serif;
  }

  input, select {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 1px;
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    padding: 10px 12px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: rgba(201,168,76,0.5);
    box-shadow: 0 0 0 2px rgba(201,168,76,0.08);
  }

  select option { background: #1a1410; }

  .class-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 4px;
  }

  .class-card {
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.02);
  }

  .class-card:hover { border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.04); }
  .class-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.08); }

  .class-card .emoji { font-size: 22px; display: block; margin-bottom: 4px; }
  .class-card .name { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }
  .class-card.selected .name { color: var(--gold); }

  .btn {
    width: 100%;
    background: linear-gradient(180deg, #2a2015 0%, #1a1408 100%);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Cinzel Decorative', serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 1px;
    margin-top: 8px;
  }

  .btn:hover {
    background: linear-gradient(180deg, rgba(201,168,76,0.15) 0%, rgba(201,168,76,0.05) 100%);
    box-shadow: 0 0 20px rgba(201,168,76,0.15);
  }

  .btn:active { transform: translateY(1px); }

  .error {
    background: rgba(139,32,32,0.15);
    border: 1px solid rgba(139,32,32,0.4);
    color: #e07070;
    padding: 10px 12px;
    border-radius: 2px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .error.show { display: block; }

  .divider {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.2em;
    margin: 20px 0;
    position: relative;
  }

  .divider::before, .divider::after {
    content: '';
    position: absolute; top: 50%;
    width: 35%; height: 1px;
    background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  [hidden] { display: none !important; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="stars"></div>

<div class="panel">
  <span class="ornament-tl">✦</span>

  <div class="crest">
    <span class="crest-icon">🐉</span>
    <h1>Family<br>Realm</h1>
    <p class="subtitle">A Chronicle of Heroes</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Enter</button>
    <button class="tab" onclick="showTab('register')">Join</button>
  </div>

  <div id="error" class="error"></div>

  <!-- Login -->
  <div id="login-form">
    <div class="form-group">
      <label>Adventurer Name</label>
      <input id="l-username" type="text" placeholder="Your name" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Secret Phrase</label>
      <input id="l-password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" onclick="login()">⚔ Enter the Realm</button>
  </div>

  <!-- Register -->
  <div id="register-form" hidden>
    <div class="form-group">
      <label>Choose Your Name</label>
      <input id="r-username" type="text" placeholder="Adventurer name" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Secret Phrase</label>
      <input id="r-password" type="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Choose Your Class</label>
      <div class="class-grid" id="class-grid">
        <div class="class-card selected" data-class="Warrior" data-avatar="⚔️" onclick="selectClass(this)">
          <span class="emoji">⚔️</span><span class="name">Warrior</span>
        </div>
        <div class="class-card" data-class="Mage" data-avatar="🔮" onclick="selectClass(this)">
          <span class="emoji">🔮</span><span class="name">Mage</span>
        </div>
        <div class="class-card" data-class="Rogue" data-avatar="🗡️" onclick="selectClass(this)">
          <span class="emoji">🗡️</span><span class="name">Rogue</span>
        </div>
        <div class="class-card" data-class="Healer" data-avatar="💚" onclick="selectClass(this)">
          <span class="emoji">💚</span><span class="name">Healer</span>
        </div>
        <div class="class-card" data-class="Ranger" data-avatar="🏹" onclick="selectClass(this)">
          <span class="emoji">🏹</span><span class="name">Ranger</span>
        </div>
        <div class="class-card" data-class="Paladin" data-avatar="🛡️" onclick="selectClass(this)">
          <span class="emoji">🛡️</span><span class="name">Paladin</span>
        </div>
        <div class="class-card" data-class="Sage" data-avatar="🧙" onclick="selectClass(this)">
          <span class="emoji">🧙</span><span class="name">Sage</span>
        </div>
      </div>
    </div>
    <button class="btn" onclick="register()">🌟 Begin Your Legend</button>
  </div>
</div>

<script>
  function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('login-form').hidden = (tab !== 'login');
    document.getElementById('register-form').hidden = (tab !== 'register');
    clearError();
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('show');
  }

  function clearError() {
    document.getElementById('error').classList.remove('show');
  }

  function selectClass(card) {
    document.querySelectorAll('.class-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
  }

  async function login() {
    clearError();
    const username = document.getElementById('l-username').value.trim();
    const password = document.getElementById('l-password').value;
    if (!username || !password) return showError('Please fill in all fields.');

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) return showError(data.error || 'Login failed');
      localStorage.setItem('rpg_token', data.token);
      localStorage.setItem('rpg_user', JSON.stringify(data.user));
      window.location.href = '/game.html';
    } catch {
      showError('Cannot reach the server. Is it running?');
    }
  }

  async function register() {
    clearError();
    const username = document.getElementById('r-username').value.trim();
    const password = document.getElementById('r-password').value;
    const selected = document.querySelector('.class-card.selected');
    const charClass = selected?.dataset.class || 'Warrior';
    const avatar = selected?.dataset.avatar || '⚔️';

    if (!username || !password) return showError('Please fill in all fields.');
    if (password.length < 4) return showError('Password must be at least 4 characters.');

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, class: charClass, avatar }),
      });
      const data = await res.json();
      if (!res.ok) return showError(data.error || 'Registration failed');
      localStorage.setItem('rpg_token', data.token);
      localStorage.setItem('rpg_user', JSON.stringify(data.user));
      window.location.href = '/game.html';
    } catch {
      showError('Cannot reach the server. Is it running?');
    }
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const loginHidden = document.getElementById('login-form').hidden;
      loginHidden ? register() : login();
    }
  });

  // Redirect if already logged in
  if (localStorage.getItem('rpg_token')) window.location.href = '/game.html';
</script>
</body>
</html>
