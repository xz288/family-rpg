<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Town Square — Ambience</title>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel+Decorative:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#08060e;
  font-family:'Crimson Text',serif;
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px 16px;
  color:#c8b88a;
}
 
h1 {
  font-family:'UnifrakturMaguntia',cursive;
  font-size:clamp(1.6rem,4vw,2.6rem);
  color:#c8b88a;
  letter-spacing:.08em;
  text-shadow:0 0 40px rgba(200,144,10,.45), 0 3px 8px rgba(0,0,0,1);
  margin-bottom:4px; text-align:center;
}
.subtitle {
  font-family:'Crimson Text',serif; font-style:italic;
  color:#5a4830; font-size:.82rem; letter-spacing:.2em;
  text-transform:uppercase; margin-bottom:28px; text-align:center;
}
 
.card {
  width:min(96vw,560px);
  background:linear-gradient(160deg,#100c18 0%,#080610 100%);
  border:1px solid #2a1e10;
  clip-path:polygon(0 10px,10px 0,calc(100% - 10px) 0,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0 calc(100% - 10px));
  padding:28px 28px 24px;
  position:relative;
}
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent 5%,#7a4808 30%,#c8900a 50%,#7a4808 70%,transparent 95%);
}
.card::after {
  content:'✦';
  position:absolute; top:-9px; left:50%; transform:translateX(-50%);
  font-size:13px; color:#7a4808; background:#08060e; padding:0 8px;
}
 
/* Visualiser canvas */
#viz-canvas {
  width:100%; height:80px;
  background:#04030a;
  border:1px solid #1a1410;
  border-radius:2px;
  margin-bottom:20px;
  display:block;
}
 
/* Play button */
.play-btn {
  width:100%; padding:13px;
  font-family:'Cinzel Decorative',serif;
  font-size:.72rem; letter-spacing:.15em;
  cursor:pointer; border:1px solid #4a2c10;
  color:#c8900a; background:transparent;
  clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));
  transition:all .22s; margin-bottom:22px;
}
.play-btn:hover  { border-color:#c8900a; background:rgba(200,144,10,.07); color:#f0c060; }
.play-btn.playing { border-color:#8a3010; color:#e05020; background:rgba(138,48,16,.08); }
 
/* Section labels */
.section-title {
  font-family:'Cinzel Decorative',serif;
  font-size:.6rem; letter-spacing:.18em; color:#5a3818;
  text-transform:uppercase; margin-bottom:10px; margin-top:18px;
}
.section-title:first-of-type { margin-top:0; }
 
/* Sliders */
.layer-row {
  display:grid;
  grid-template-columns:130px 1fr 42px;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.layer-name {
  font-family:'Crimson Text',serif; font-style:italic;
  font-size:.9rem; color:#8a6840;
}
input[type=range] {
  -webkit-appearance:none; appearance:none;
  width:100%; height:3px; background:#1e1810;
  border-radius:2px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px;
  border-radius:50%; background:#7a4808;
  border:1px solid #c8900a; cursor:pointer;
  transition:background .15s;
}
input[type=range]:hover::-webkit-slider-thumb { background:#c8900a; }
.vol-val {
  font-family:'Crimson Text',serif; font-size:.78rem;
  color:#5a3e20; text-align:right; min-width:32px;
}
 
/* Mood selector */
.mood-row {
  display:flex; gap:8px; flex-wrap:wrap; margin-bottom:4px;
}
.mood-btn {
  font-family:'Cinzel Decorative',serif; font-size:.58rem;
  letter-spacing:.1em; padding:6px 12px; cursor:pointer;
  border:1px solid #2a1c0e; color:#6a4820; background:transparent;
  transition:all .18s;
  clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,4px 100%,0 calc(100% - 4px));
}
.mood-btn:hover  { border-color:#7a4810; color:#a86830; }
.mood-btn.active { border-color:#c8900a; color:#f0c060; background:rgba(200,144,10,.08); }
 
/* Bell interval */
.bell-row {
  display:grid; grid-template-columns:130px 1fr 42px;
  align-items:center; gap:10px; margin-bottom:10px;
}
 
/* Divider */
.divider {
  height:1px;
  background:repeating-linear-gradient(90deg,transparent,transparent 4px,#1e1408 4px,#1e1408 8px);
  margin:16px 0;
}
 
/* Status */
#status-line {
  font-family:'Crimson Text',serif; font-style:italic;
  font-size:.78rem; color:#3a2818; text-align:center;
  margin-top:14px; min-height:1.1em; letter-spacing:.05em;
}
 
/* Note indicator */
.note-flash {
  display:inline-block; width:8px; height:8px; border-radius:50%;
  background:#3a2810; margin-left:6px; vertical-align:middle;
  transition:background .1s;
}
.note-flash.lit { background:#c8900a; }
</style>
</head>
<body>
 
<h1>⸸ Town Square ⸸</h1>
<p class="subtitle">― ambient soundscape ―</p>
 
<div class="card">
  <canvas id="viz-canvas"></canvas>
 
  <button class="play-btn" id="play-btn" onclick="togglePlay()">
    ▶ &nbsp; Begin the Night
  </button>
 
  <!-- MOOD -->
  <div class="section-title">Mood</div>
  <div class="mood-row">
    <button class="mood-btn active" id="mood-ominous" onclick="setMood('ominous')">Ominous</button>
    <button class="mood-btn"        id="mood-tense"   onclick="setMood('tense')">Tense</button>
    <button class="mood-btn"        id="mood-melancholic" onclick="setMood('melancholic')">Melancholic</button>
    <button class="mood-btn"        id="mood-dread"   onclick="setMood('dread')">Pure Dread</button>
  </div>
 
  <div class="divider"></div>
 
  <!-- LAYERS -->
  <div class="section-title">Layers &nbsp;<span class="note-flash" id="note-flash"></span></div>
 
  <div class="layer-row">
    <span class="layer-name">Deep Drone</span>
    <input type="range" id="vol-drone" min="0" max="100" value="80" oninput="setVol('drone',this.value)"/>
    <span class="vol-val" id="lbl-drone">80</span>
  </div>
  <div class="layer-row">
    <span class="layer-name">Dark Pad</span>
    <input type="range" id="vol-pad" min="0" max="100" value="60" oninput="setVol('pad',this.value)"/>
    <span class="vol-val" id="lbl-pad">60</span>
  </div>
  <div class="layer-row">
    <span class="layer-name">Wind</span>
    <input type="range" id="vol-wind" min="0" max="100" value="45" oninput="setVol('wind',this.value)"/>
    <span class="vol-val" id="lbl-wind">45</span>
  </div>
  <div class="layer-row">
    <span class="layer-name">Melody</span>
    <input type="range" id="vol-melody" min="0" max="100" value="55" oninput="setVol('melody',this.value)"/>
    <span class="vol-val" id="lbl-melody">55</span>
  </div>
  <div class="layer-row">
    <span class="layer-name">Low Pulse</span>
    <input type="range" id="vol-pulse" min="0" max="100" value="40" oninput="setVol('pulse',this.value)"/>
    <span class="vol-val" id="lbl-pulse">40</span>
  </div>
  <div class="layer-row">
    <span class="layer-name">Bell Tower</span>
    <input type="range" id="vol-bell" min="0" max="100" value="70" oninput="setVol('bell',this.value)"/>
    <span class="vol-val" id="lbl-bell">70</span>
  </div>
 
  <div class="divider"></div>
 
  <!-- BELL INTERVAL -->
  <div class="section-title">Bell Interval</div>
  <div class="bell-row">
    <span class="layer-name">Every</span>
    <input type="range" id="bell-interval" min="4" max="30" value="12" step="1"
           oninput="setBellInterval(this.value)"/>
    <span class="vol-val" id="lbl-bell-interval">12s</span>
  </div>
 
  <div id="status-line">silence holds the square...</div>
</div>
 
<script>
/* ══════════════════════════════════════════════
   GOTHIC TOWN SQUARE AMBIENT COMPOSER
   Web Audio API — all synthesis, no samples
   ══════════════════════════════════════════════ */
 
let ctx = null;
let isPlaying = false;
let masterGain = null;
let analyser = null;
let vizFrame = null;
let bellTimer = null;
let melodyTimer = null;
let pulseTimer = null;
 
/* Gain nodes for each layer */
const gains = {};
/* Current volumes (0–1) */
const vols = { drone:0.8, pad:0.6, wind:0.45, melody:0.55, pulse:0.4, bell:0.7 };
let bellInterval = 12; // seconds
 
/* ── Mood presets: [drone root Hz, pad chord offsets (semitones), melody scale] ── */
const moods = {
  ominous:     { root:41.2,  padSemi:[0,7,12,19],     scale:[0,2,3,5,7,8,10], tempo:0.38, name:"Ominous" },
  tense:       { root:46.2,  padSemi:[0,6,10,15],     scale:[0,1,3,5,6,8,10], tempo:0.52, name:"Tense & Brooding" },
  melancholic: { root:43.7,  padSemi:[0,3,7,10,14],   scale:[0,2,3,5,7,8,10], tempo:0.32, name:"Melancholic" },
  dread:       { root:36.7,  padSemi:[0,1,6,11,13],   scale:[0,1,2,6,7,8,11], tempo:0.28, name:"Pure Dread" },
};
let currentMood = 'ominous';
 
/* running oscillators/sources that need to be stopped on mood change */
let liveNodes = [];
 
function semToHz(base, semi) {
  return base * Math.pow(2, semi / 12);
}
 
/* ── INIT AUDIO CONTEXT ── */
function initCtx() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
 
  masterGain = ctx.createGain();
  masterGain.gain.setValueAtTime(0.72, ctx.currentTime);
 
  analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  analyser.smoothingTimeConstant = 0.88;
 
  masterGain.connect(analyser);
  analyser.connect(ctx.destination);
 
  /* Create named gain nodes */
  ['drone','pad','wind','melody','pulse','bell'].forEach(k => {
    gains[k] = ctx.createGain();
    gains[k].gain.setValueAtTime(vols[k] * 0.85, ctx.currentTime);
    gains[k].connect(masterGain);
  });
}
 
/* ── REVERB (simple convolution) ── */
function makeReverb(duration=3, decay=2) {
  const len   = ctx.sampleRate * duration;
  const buf   = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let c=0;c<2;c++) {
    const d = buf.getChannelData(c);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
  }
  const conv = ctx.createConvolver();
  conv.buffer = buf;
  return conv;
}
 
let sharedReverb = null;
function getReverb() {
  if (!sharedReverb) sharedReverb = makeReverb(3.5, 1.8);
  return sharedReverb;
}
 
/* ── DEEP DRONE ── */
function startDrone(mood) {
  const rev   = getReverb();
  rev.connect(gains.drone);
  const freqs = [mood.root, mood.root*2, mood.root*3];
  freqs.forEach((f,i) => {
    const osc  = ctx.createOscillator();
    const gn   = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 280 + i*80;
    osc.type = i===0 ? 'sawtooth' : 'sine';
    osc.frequency.setValueAtTime(f, ctx.currentTime);
    /* slow detune wobble */
    osc.frequency.setTargetAtTime(f*1.0015, ctx.currentTime+3, 5);
    osc.frequency.setTargetAtTime(f*0.9990, ctx.currentTime+9, 5);
    gn.gain.setValueAtTime(i===0 ? 0.55 : 0.18, ctx.currentTime);
    osc.connect(filt); filt.connect(gn); gn.connect(rev);
    osc.start();
    liveNodes.push(osc);
  });
}
 
/* ── DARK PAD (chord) ── */
function startPad(mood) {
  const rev = makeReverb(5, 1.4);
  rev.connect(gains.pad);
  mood.padSemi.forEach((semi,i) => {
    const freq = semToHz(mood.root * 2, semi);
    const osc  = ctx.createOscillator();
    const gn   = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    filt.type='lowpass'; filt.frequency.value = 600;
    filt.Q.value = 1.2;
    osc.type = i%2===0 ? 'triangle' : 'sine';
    osc.frequency.value = freq;
    /* slight detune per voice */
    osc.detune.value = (i - mood.padSemi.length/2) * 3.5;
    gn.gain.setValueAtTime(0, ctx.currentTime);
    gn.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 2.5);
    osc.connect(filt); filt.connect(gn); gn.connect(rev);
    osc.start();
    liveNodes.push(osc);
  });
}
 
/* ── WIND (filtered noise) ── */
function startWind() {
  const bufLen = ctx.sampleRate * 4;
  const noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  /* pink-ish noise via first order filter */
  let b0=0,b1=0,b2=0;
  for (let i=0;i<bufLen;i++){
    const w = Math.random()*2-1;
    b0 = 0.99886*b0 + w*0.0555179;
    b1 = 0.99332*b1 + w*0.0750759;
    b2 = 0.96900*b2 + w*0.1538520;
    data[i] = (b0+b1+b2+w*0.5362)*0.11;
  }
  const src = ctx.createBufferSource();
  src.buffer = noiseBuf; src.loop = true;
 
  const bp1 = ctx.createBiquadFilter(); bp1.type='bandpass'; bp1.frequency.value=320; bp1.Q.value=0.6;
  const bp2 = ctx.createBiquadFilter(); bp2.type='bandpass'; bp2.frequency.value=820; bp2.Q.value=0.4;
  const wgn  = ctx.createGain(); wgn.gain.setValueAtTime(0.45, ctx.currentTime);
 
  /* slow volume swell */
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
  const lfog = ctx.createGain(); lfog.gain.value = 0.18;
  lfo.connect(lfog); lfog.connect(wgn.gain); lfo.start();
  liveNodes.push(lfo);
 
  src.connect(bp1); src.connect(bp2);
  bp1.connect(wgn); bp2.connect(wgn);
  wgn.connect(gains.wind);
  src.start();
  liveNodes.push(src);
}
 
/* ── MELODIC THEME ── */
/* A slow haunting melody drawn from the mood scale */
function scheduleMelody(mood) {
  if (!isPlaying) return;
  const scale = mood.scale;
  const root  = mood.root * 4; /* two octaves up */
  /* pick a 4-note phrase */
  const phrase = [
    scale[0], scale[2], scale[4], scale[3],
    scale[1], scale[3], scale[2], scale[0]
  ];
  const noteLen = 1.0 / mood.tempo * 0.55; /* seconds per note */
  let t = ctx.currentTime + 0.1;
 
  const rev = makeReverb(4, 1.6);
  rev.connect(gains.melody);
 
  phrase.forEach((semi, i) => {
    const freq = semToHz(root, semi);
    const osc  = ctx.createOscillator();
    const gn   = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    osc.detune.value = (Math.random()-0.5)*8;
    const on  = t + i * noteLen;
    const off = on + noteLen * 0.85;
    gn.gain.setValueAtTime(0, on);
    gn.gain.linearRampToValueAtTime(0.35, on + 0.05);
    gn.gain.setTargetAtTime(0, off, 0.3);
    osc.connect(gn); gn.connect(rev);
    osc.start(on); osc.stop(off + 1.5);
    liveNodes.push(osc);
 
    /* flash note indicator */
    const flashDelay = (on - ctx.currentTime) * 1000;
    const f = document.getElementById('note-flash');
    setTimeout(()=>{ f.classList.add('lit'); setTimeout(()=>f.classList.remove('lit'),120); }, flashDelay);
  });
 
  const totalDur = phrase.length * noteLen * 1000;
  /* random rest 2–6s then replay */
  const rest = (2 + Math.random()*4) * 1000;
  melodyTimer = setTimeout(() => scheduleMelody(getMoodObj()), totalDur + rest);
}
 
/* ── LOW PULSE (heartbeat-like) ── */
function schedulePulse(mood) {
  if (!isPlaying) return;
  const period = 1.0 / mood.tempo; /* seconds per beat */
 
  function beat() {
    if (!isPlaying) return;
    const osc  = ctx.createOscillator();
    const gn   = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    filt.type='lowpass'; filt.frequency.value=120;
    osc.type='sine';
    osc.frequency.value = mood.root * 1.5;
    gn.gain.setValueAtTime(0, ctx.currentTime);
    gn.gain.linearRampToValueAtTime(0.7, ctx.currentTime + 0.02);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
    osc.connect(filt); filt.connect(gn); gn.connect(gains.pulse);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
    liveNodes.push(osc);
    pulseTimer = setTimeout(beat, period * 1000);
  }
  beat();
}
 
/* ── BELL ── */
function ringBell() {
  if (!isPlaying) return;
  const rev = makeReverb(6, 0.8);
  rev.connect(gains.bell);
 
  const mood = getMoodObj();
  const bellFreq = semToHz(mood.root * 8, mood.scale[4]);
 
  /* Three partials */
  [1, 2.756, 5.404].forEach((partial, i) => {
    const osc = ctx.createOscillator();
    const gn  = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = bellFreq * partial;
    gn.gain.setValueAtTime(0, ctx.currentTime);
    gn.gain.linearRampToValueAtTime(i===0 ? 0.6 : 0.25/(i+1), ctx.currentTime + 0.01);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (5 - i*1.2));
    osc.connect(gn); gn.connect(rev);
    osc.start(); osc.stop(ctx.currentTime + 6);
    liveNodes.push(osc);
  });
 
  setStatus('The bell tower strikes the hour...');
  setTimeout(() => setStatus('The square breathes in darkness...'), 3000);
}
 
function scheduleBell() {
  if (!isPlaying) return;
  ringBell();
  bellTimer = setTimeout(scheduleBell, bellInterval * 1000);
}
 
/* ── MOOD ── */
function getMoodObj() { return moods[currentMood]; }
 
function setMood(m) {
  currentMood = m;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mood-' + m).classList.add('active');
  if (isPlaying) {
    /* Crossfade to new mood */
    setStatus(`Shifting to ${moods[m].name}...`);
    stopLayers();
    setTimeout(() => { startLayers(); }, 400);
  }
}
 
/* ── VOLUME ── */
function setVol(layer, val) {
  vols[layer] = val / 100;
  document.getElementById('lbl-' + layer).textContent = val;
  if (gains[layer]) {
    gains[layer].gain.setTargetAtTime(vols[layer] * 0.85, ctx.currentTime, 0.15);
  }
}
 
function setBellInterval(val) {
  bellInterval = parseInt(val);
  document.getElementById('lbl-bell-interval').textContent = val + 's';
  if (isPlaying) {
    clearTimeout(bellTimer);
    bellTimer = setTimeout(scheduleBell, bellInterval * 1000);
  }
}
 
/* ── START / STOP LAYERS ── */
function startLayers() {
  const mood = getMoodObj();
  startDrone(mood);
  startPad(mood);
  startWind();
  scheduleMelody(mood);
  schedulePulse(mood);
  setTimeout(() => scheduleBell(), 3000 + Math.random()*4000);
}
 
function stopLayers() {
  const now = ctx.currentTime;
  liveNodes.forEach(n => {
    try {
      if (n.gain) { n.gain.setTargetAtTime(0, now, 0.3); }
      if (n.stop) { n.stop(now + 1); }
    } catch(e) {}
  });
  liveNodes = [];
  clearTimeout(melodyTimer);
  clearTimeout(pulseTimer);
  clearTimeout(bellTimer);
  sharedReverb = null;
}
 
/* ── PLAY / PAUSE ── */
function togglePlay() {
  initCtx();
  if (ctx.state === 'suspended') ctx.resume();
 
  if (!isPlaying) {
    isPlaying = true;
    startLayers();
    document.getElementById('play-btn').textContent = '◼  Silence the Night';
    document.getElementById('play-btn').classList.add('playing');
    setStatus('The darkness stirs... the square comes alive.');
    startViz();
  } else {
    isPlaying = false;
    stopLayers();
    document.getElementById('play-btn').textContent = '▶  Begin the Night';
    document.getElementById('play-btn').classList.remove('playing');
    setStatus('silence holds the square...');
    cancelAnimationFrame(vizFrame);
  }
}
 
/* ── VISUALISER ── */
function startViz() {
  const canvas = document.getElementById('viz-canvas');
  const W = canvas.width  = canvas.offsetWidth;
  const H = canvas.height = canvas.offsetHeight;
  const cctx = canvas.getContext('2d');
  const bufLen = analyser.frequencyBinCount;
  const dataArr = new Uint8Array(bufLen);
 
  function draw() {
    vizFrame = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(dataArr);
 
    cctx.fillStyle = '#04030a';
    cctx.fillRect(0,0,W,H);
 
    /* draw frequency bars */
    const barW = W / bufLen * 2.2;
    let x = 0;
    for (let i=0; i<bufLen; i++) {
      const v = dataArr[i] / 255;
      const bh = v * H * 0.92;
      /* colour shifts with intensity: dark red → amber → pale gold */
      const r = Math.round(80 + v * 160);
      const g = Math.round(v * v * 120);
      const b = Math.round(v * 20);
      cctx.fillStyle = `rgb(${r},${g},${b})`;
      cctx.fillRect(x, H - bh, barW - 1, bh);
      x += barW;
    }
 
    /* horizontal glow line at peak */
    const peak = Math.max(...dataArr) / 255;
    if (peak > 0.05) {
      const ly = H - peak * H * 0.92;
      const grad = cctx.createLinearGradient(0,0,W,0);
      grad.addColorStop(0,'transparent');
      grad.addColorStop(0.3, `rgba(200,100,10,${peak*0.5})`);
      grad.addColorStop(0.5, `rgba(240,180,20,${peak*0.6})`);
      grad.addColorStop(0.7, `rgba(200,100,10,${peak*0.5})`);
      grad.addColorStop(1,'transparent');
      cctx.strokeStyle = grad;
      cctx.lineWidth = 1;
      cctx.beginPath(); cctx.moveTo(0,ly); cctx.lineTo(W,ly); cctx.stroke();
    }
  }
  draw();
}
 
/* ── STATUS ── */
function setStatus(msg) {
  document.getElementById('status-line').textContent = msg;
}
</script>
